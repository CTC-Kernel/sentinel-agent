[package]
name = "agent-core"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Sentinel GRC endpoint compliance monitoring agent"

[features]
default = ["tray", "gui", "fim"]
# Enable system tray GUI (macOS/Windows desktop mode)
tray = ["dep:tray-icon", "dep:muda", "dep:image", "dep:open", "dep:tao"]
# Enable v2 desktop GUI features (Tauri-based)
gui = ["agent-gui", "agent-persistence"]
fim = ["agent-fim"]

[dependencies]
agent-common = { path = "../agent-common" }
agent-network = { path = "../agent-network" }
agent-scanner = { path = "../agent-scanner" }
agent-storage = { path = "../agent-storage" }
agent-sync = { path = "../agent-sync" }
agent-gui = { path = "../agent-gui", optional = true }
agent-persistence = { path = "../agent-persistence", optional = true }
agent-fim = { path = "../agent-fim", optional = true }
tokio.workspace = true
rayon.workspace = true
battery.workspace = true
sysinfo.workspace = true
base64 = "0.22"
blake3.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
thiserror.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
reqwest.workspace = true
hostname.workspace = true
uuid.workspace = true
tray-icon = { workspace = true, optional = true }
muda = { workspace = true, optional = true }
image = { workspace = true, optional = true }
open = { workspace = true, optional = true }
tao = { workspace = true, optional = true }
directories.workspace = true

[target.'cfg(windows)'.dependencies]
windows-service.workspace = true
windows.workspace = true

[target.'cfg(unix)'.dependencies]
libc.workspace = true
signal-hook.workspace = true

# DEB package metadata (cargo-deb)
[package.metadata.deb]
name = "sentinel-agent"
maintainer = "Cyber Threat Consulting <contact@cyber-threat-consulting.com>"
copyright = "2024-2026 Cyber Threat Consulting"
license-file = ["../../LICENSE", "0"]
extended-description = """\
Endpoint compliance monitoring agent for Sentinel GRC platform. \
Performs automated security checks and reports compliance status."""
section = "admin"
priority = "optional"
depends = "$auto"
assets = [
    ["target/release/agent-core", "/opt/sentinel-grc/bin/sentinel-agent", "755"],
    ["../../config/agent.example.json", "/etc/sentinel/agent.json", "600"],
    ["../../wix/license.rtf", "/opt/sentinel-grc/share/doc/LICENSE.rtf", "644"],
    ["debian/sentinel-agent.service", "/etc/systemd/system/sentinel-agent.service", "644"],
]
maintainer-scripts = "debian/"

# RPM package metadata (cargo-generate-rpm)
[package.metadata.generate-rpm]
name = "sentinel-agent"
release = "1"
license = "Proprietary"
summary = "Sentinel GRC endpoint compliance monitoring agent"
assets = [
    { source = "target/release/agent-core", dest = "/opt/sentinel-grc/bin/sentinel-agent", mode = "755" },
    { source = "config/agent.example.json", dest = "/etc/sentinel/agent.json", mode = "600", config = true },
    { source = "crates/agent-core/debian/sentinel-agent.service", dest = "/etc/systemd/system/sentinel-agent.service", mode = "644" },
]
post_install_script = "crates/agent-core/debian/postinst"
pre_uninstall_script = "crates/agent-core/debian/prerm"
post_uninstall_script = "crates/agent-core/debian/postrm"
