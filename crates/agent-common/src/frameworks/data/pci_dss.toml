[framework]
id = "PCI_DSS"
name = "PCI DSS"
version = "4.0"
description = "Payment Card Industry Data Security Standard"
applicability = ["Payment Processing", "Financial Services", "Retail", "E-commerce"]
reference_url = "https://www.pcisecuritystandards.org/"

# Disk Encryption -> Req 3: Protect Stored Account Data
[[controls]]
check_id = "disk_encryption"
control_id = "3.5.1"
control_name = "Render PAN unreadable anywhere it is stored"
category = "Protect Stored Data"
description = "Disk-level encryption to protect stored cardholder data"
weight = 0.95
is_critical = true

# Firewall -> Req 1: Install and Maintain Network Security Controls
[[controls]]
check_id = "firewall"
control_id = "1.2.1"
control_name = "Configuration standards for network security controls"
category = "Network Security"
description = "Configuration standards for firewall and network security controls"
weight = 0.95
is_critical = true

[[controls]]
check_id = "firewall"
control_id = "1.4.1"
control_name = "NSCs are implemented between trusted and untrusted networks"
category = "Network Security"
description = "Network security controls implemented between networks"
weight = 0.9
is_critical = true

