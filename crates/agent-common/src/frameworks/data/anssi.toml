control_id = "M20"
control_name = "Installer un pare-feu"
category = "Sécurité Réseau"
description = "Installer et configurer un pare-feu sur chaque poste et à l'entrée du réseau"
weight = 0.95
is_critical = true

[[controls]]
check_id = "dns_security"
control_id = "M23"
control_name = "Sécuriser DNS et communications"
category = "Sécurité Réseau"
