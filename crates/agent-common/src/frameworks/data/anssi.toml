control_id = "M36"
control_name = "Surveiller l'intégrité des fichiers"
category = "Supervision et Audit"
description = "Kernel hardening protège l'intégrité des fichiers système critiques"
weight = 0.85
is_critical = true

[[controls]]
check_id = "backup_configured"
control_id = "M37"
control_name = "Sauvegarder les données"
category = "Supervision et Audit"
description = "Effectuer des sauvegardes régulières et tester leur restauration"
weight = 0.95
is_critical = true

[[controls]]
check_id = "audit_logging"
control_id = "M39"
control_name = "Analyser les journaux"
category = "Supervision et Audit"
description = "Analyser régulièrement les journaux pour détecter les anomalies"
weight = 0.85
is_critical = true

# ========================================================================
# DOMAIN: Pour aller plus loin (40-42)
# ========================================================================

[[controls]]
check_id = "container_security"
control_id = "M40"
