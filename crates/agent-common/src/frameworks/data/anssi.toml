[framework]
id = "ANSSI_HYGIENE"
name = "ANSSI Guide d'Hygiène Informatique"
version = "2.0"
description = "42 mesures essentielles pour la sécurité des SI - TPE/PME"
applicability = ["TPE/PME", "France", "Europe"]
reference_url = "https://www.ssi.gouv.fr/guide/guide-dhygiene-informatique/"

# ========================================================================
# DOMAIN: Authentifier et contrôler les accès (9-14)
# ========================================================================

[[controls]]
check_id = "password_policy"
control_id = "M09"
control_name = "Identifier nommément chaque utilisateur"
category = "Authentification et Contrôle d'Accès"
description = "Attribuer un identifiant unique à chaque utilisateur et interdire les comptes partagés"
weight = 0.9
is_critical = true

[[controls]]
check_id = "password_policy"
control_id = "M10"
control_name = "Définir des règles de mots de passe"
category = "Authentification et Contrôle d'Accès"
description = "Définir et faire appliquer des règles de choix et de dimensionnement des mots de passe"
weight = 0.95
is_critical = true

[[controls]]
check_id = "mfa_enabled"
control_id = "M11"
control_name = "Protéger les mots de passe stockés"
category = "Authentification et Contrôle d'Accès"
description = "Protéger les mots de passe stockés sur les systèmes avec des mécanismes robustes"
weight = 0.9
is_critical = true

[[controls]]
check_id = "mfa_enabled"
control_id = "M12"
control_name = "Changer les authentifications par défaut"
category = "Authentification et Contrôle d'Accès"
description = "Modifier les éléments d'authentification par défaut sur les équipements et services"
weight = 0.95
is_critical = true

[[controls]]
check_id = "mfa_enabled"
control_id = "M13"
control_name = "Authentifications fortes"
category = "Authentification et Contrôle d'Accès"
description = "Privilégier les authentifications multi-facteurs pour les accès sensibles"
weight = 0.9
is_critical = true

[[controls]]
check_id = "admin_accounts"
control_id = "M14"
control_name = "Gérer les droits d'accès"
category = "Authentification et Contrôle d'Accès"
description = "Attribuer les droits d'accès selon le principe du moindre privilège"
weight = 0.85
is_critical = true

# ========================================================================
# DOMAIN: Sécuriser les postes (15-19)
# ========================================================================

[[controls]]
check_id = "antivirus_active"
control_id = "M15"
control_name = "Utiliser un antivirus"
category = "Sécurité des Postes"
description = "Installer et maintenir à jour un logiciel antivirus sur tous les postes"
weight = 0.95
is_critical = true

[[controls]]
check_id = "screen_lock"
control_id = "M16"
control_name = "Verrouillage automatique des sessions"
category = "Sécurité des Postes"
description = "Activer le verrouillage automatique des sessions après période d'inactivité"
weight = 0.8
is_critical = false

[[controls]]
check_id = "patches_current"
control_id = "M17"
control_name = "Appliquer les mises à jour"
category = "Sécurité des Postes"
description = "Se tenir informé et appliquer rapidement les mises à jour de sécurité"
weight = 0.95
is_critical = true

[[controls]]
check_id = "update_status"
control_id = "M17"
control_name = "Appliquer les mises à jour"
category = "Sécurité des Postes"
description = "Suivre l'état des mises à jour de sécurité sur les postes"
weight = 0.9
is_critical = true

[[controls]]
check_id = "disk_encryption"
control_id = "M18"
control_name = "Chiffrer les données sensibles"
category = "Sécurité des Postes"
description = "Chiffrer les données sensibles transmises et stockées"
weight = 0.9
is_critical = true

[[controls]]
check_id = "secure_boot"
control_id = "M19"
control_name = "Sécuriser le démarrage"
category = "Sécurité des Postes"
description = "Activer le démarrage sécurisé pour prévenir les compromissions au boot"
weight = 0.85
is_critical = true

# ========================================================================
