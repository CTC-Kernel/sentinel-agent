# ========================================================================
# DOMAIN: Maintenir le SI à jour (33-35)
# ========================================================================

# M33-M35: No direct automated checks (vulnerability scanning, asset/software inventory
# are organizational processes, not endpoint compliance checks)

# ========================================================================
# DOMAIN: Superviser, auditer, réagir (36-39)
# ========================================================================

[[controls]]
