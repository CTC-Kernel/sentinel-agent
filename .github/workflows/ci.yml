name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security Audit
      run: npm audit --audit-level=high
      continue-on-error: false

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm run test -- --run

    - name: Build
      run: npm run build
      env:
        # Add dummy env vars if build requires them, or rely on .env.production if checked in (not recommended for secrets)
        # For a basic build check, we might need to mock some if the build script fails without them.
        # Assuming standard Vite build doesn't hard-fail on missing runtime env vars unless they are used in build config.
        VITE_APP_VERSION: '0.0.0-ci'
