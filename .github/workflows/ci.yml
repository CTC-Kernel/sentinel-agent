name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Format check - fast, run first
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Clippy linting
  clippy:
    name: Clippy Linting
    runs-on: ubuntu-latest
    needs: fmt
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # License and security checks with cargo-deny
  deny:
    name: License & Security (cargo-deny)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Security audit with cargo-audit
  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings

  # Unit tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [clippy, deny]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - run: cargo test --all-features

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov --all-features --workspace --json | jq '.data[0].totals.lines.percent')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::warning::Coverage is below 70% threshold: $COVERAGE%"
          fi

  # Build release artifacts - Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - run: cargo build --release --package agent-core
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux
          path: target/release/agent-core

  # Build release artifacts - Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Build release binary
        run: cargo build --release --package agent-core
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-windows
          path: target/release/agent-core.exe

  # Build Windows MSI installer
  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-windows
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --package agent-core
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          $version = "0.1.0"
          wix build -d "TargetDir=.\target\release" -d "Version=$version" -d "AssetsDir=.\assets" -o "sentinel-agent-$version.msi" wix/main.wxs
        shell: pwsh

      - name: Generate checksum
        run: |
          $hash = Get-FileHash -Path "sentinel-agent-0.1.0.msi" -Algorithm SHA256
          "$($hash.Hash.ToLower())  sentinel-agent-0.1.0.msi" | Out-File -FilePath "sentinel-agent-0.1.0.msi.sha256" -Encoding ASCII
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-msi
          path: |
            sentinel-agent-*.msi
            sentinel-agent-*.sha256

  # Build Linux DEB package
  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    needs: build-linux
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary first
        run: cargo build --release --package agent-core

      - name: Build DEB
        run: cargo deb --package agent-core --no-build

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-deb
          path: target/debian/*.deb

  # Build Linux RPM package
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    needs: build-linux
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --package agent-core

      - name: Strip binary
        run: strip target/release/agent-core

      - name: Build RPM
        run: cargo generate-rpm -p crates/agent-core

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-rpm
          path: target/generate-rpm/*.rpm

  # Build macOS universal binary
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --package agent-core --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --package agent-core --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-macos
          path: target/release/agent-core

  # Build macOS DMG
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --package agent-core --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --package agent-core --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Build DMG
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh

      - name: Generate checksum
        run: |
          cd target/release
          for f in *.dmg; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-dmg
          path: |
            target/release/*.dmg
            target/release/*.sha256
