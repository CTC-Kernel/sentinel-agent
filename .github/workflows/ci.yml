name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Format check - fast, run first
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Clippy linting
  clippy:
    name: Clippy Linting
    runs-on: ubuntu-latest
    needs: fmt
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # License and security checks with cargo-deny
  deny:
    name: License & Security (cargo-deny)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Security audit with cargo-audit
  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings

  # Unit tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [clippy, deny]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - run: cargo test --all-features

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov --all-features --workspace --json | jq '.data[0].totals.lines.percent')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::warning::Coverage is below 70% threshold: $COVERAGE%"
          fi

  # Build release artifacts - Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - run: cargo build --release --package agent-core --features gui
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux
          path: target/release/agent-core

  # Build release artifacts - Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Build release binary
        run: cargo build --release --package agent-core --features gui
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-windows
          path: target/release/agent-core.exe

  # Build Windows MSI installer
  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-windows
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --package agent-core --features gui
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext
          wix extension add -g WixToolset.Util.wixext
          wix extension add -g WixToolset.Firewall.wixext

      - name: Build MSI
        run: |
          $version = (Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          wix build -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext -ext WixToolset.Firewall.wixext -d "TargetDir=.\target\release" -d "Version=$version" -d "AssetsDir=.\assets" -o "sentinel-agent-$version.msi" wix/main.wxs
          echo "MSI_VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Generate checksum
        run: |
          $version = $env:MSI_VERSION
          $hash = Get-FileHash -Path "sentinel-agent-$version.msi" -Algorithm SHA256
          "$($hash.Hash.ToLower())  sentinel-agent-$version.msi" | Out-File -FilePath "sentinel-agent-$version.msi.sha256" -Encoding ASCII
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-msi
          path: |
            sentinel-agent-*.msi
            sentinel-agent-*.sha256

  # Build Linux DEB package
  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    needs: build-linux
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary first
        run: cargo build --release --package agent-core --features gui

      - name: Build DEB
        run: cargo deb --package agent-core --no-build

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-deb
          path: target/debian/*.deb

  # Build Linux RPM package
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    needs: build-linux
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --package agent-core --features gui

      - name: Strip binary
        run: strip target/release/agent-core

      - name: Build RPM
        run: cargo generate-rpm -p crates/agent-core

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-rpm
          path: target/generate-rpm/*.rpm

  # Build macOS universal binary
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --package agent-core --features gui --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --package agent-core --features gui --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-macos
          path: target/release/agent-core

  # Build macOS DMG (signed and notarized)
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --package agent-core --features gui --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --package agent-core --features gui --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Save password to file to avoid shell escaping issues
          echo -n "$APPLE_CERTIFICATE_PASSWORD" > $RUNNER_TEMP/password.txt

          # Import certificate
          CLEAN_CERT=$(echo "$APPLE_CERTIFICATE_P12" | sed 's/^.*P12=//' | tr -d '\n\r ')
          echo "$CLEAN_CERT" | base64 --decode > $RUNNER_TEMP/certificate.p12
          
          # Verify certificate password
          CERT_VALID=false
          if openssl pkcs12 -legacy -in $RUNNER_TEMP/certificate.p12 -passin file:$RUNNER_TEMP/password.txt -info -noout >/dev/null 2>&1; then
            CERT_VALID=true
            echo "✅ Certificate verified with -legacy flag"
          elif openssl pkcs12 -in $RUNNER_TEMP/certificate.p12 -passin file:$RUNNER_TEMP/password.txt -info -noout >/dev/null 2>&1; then
            CERT_VALID=true
            echo "✅ Certificate verified without -legacy flag"
          fi

          if [ "$CERT_VALID" = false ]; then
            echo "::error::APPLE_CERTIFICATE password is invalid or the .p12 is corrupted."
            exit 1
          fi

          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Add to search list (prepend to existing)
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify certificate is available
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          rm $RUNNER_TEMP/certificate.p12
          rm $RUNNER_TEMP/password.txt

      - name: Create App Bundle and Sign
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_NAME="Sentinel Agent"
          APP_BUNDLE="target/release/$APP_NAME.app"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "=== Creating app bundle ==="
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"

          # Copy binary
          cp target/release/agent-core "$APP_BUNDLE/Contents/MacOS/sentinel-agent"
          chmod +x "$APP_BUNDLE/Contents/MacOS/sentinel-agent"

          # Copy Info.plist
          cp macos/Info.plist "$APP_BUNDLE/Contents/"

          # Copy icon if exists
          if [ -f "assets/icons/sentinel-agent.icns" ]; then
            cp "assets/icons/sentinel-agent.icns" "$APP_BUNDLE/Contents/Resources/AppIcon.icns"
          fi

          # Create PkgInfo
          echo "APPL????" > "$APP_BUNDLE/Contents/PkgInfo"

          echo "=== Code signing ==="
          # Find Developer ID certificate
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')

          if [ -n "$IDENTITY" ]; then
            echo "Signing with: $IDENTITY"
            codesign --force --deep --options runtime \
              --entitlements macos/entitlements.plist \
              --sign "$IDENTITY" \
              "$APP_BUNDLE"

            # Verify signature
            codesign --verify --verbose=2 "$APP_BUNDLE"
            echo "Code signing successful!"
          else
            echo "::error::No Developer ID Application certificate found!"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "=== Creating DMG ==="
          DMG_PATH="target/release/SentinelAgent-$VERSION.dmg"
          DMG_TEMP="target/release/dmg-temp"
          rm -rf "$DMG_TEMP"
          mkdir -p "$DMG_TEMP"

          # Copy app
          cp -R "$APP_BUNDLE" "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"

          # Create DMG
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$DMG_PATH"

          rm -rf "$DMG_TEMP"
          echo "DMG created: $DMG_PATH"

      - name: Notarize DMG
        timeout-minutes: 25
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(ls target/release/*.dmg | head -1)
          echo "Notarizing $DMG_PATH..."

          # Submit for notarization and wait up to 20 minutes
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$DMG_PATH"
          echo "Notarization and stapling complete!"

          # Verify staple
          xcrun stapler validate "$DMG_PATH"

      - name: Generate checksum
        run: |
          cd target/release
          for f in *.dmg; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-dmg
          path: |
            target/release/*.dmg
            target/release/*.sha256
