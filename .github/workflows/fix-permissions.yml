name: Fix Firebase Storage Permissions

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for fixing permissions'
        required: false
        default: 'Manual permission fix'
  schedule:
    # Run every 6 hours to ensure permissions stay correct
    - cron: '0 */6 * * *'

jobs:
  fix-permissions:
    name: Fix Firebase Storage Permissions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: 'latest'

      - name: Fix permissions
        run: |
          chmod +x ./scripts/fix-permissions.sh
          ./scripts/fix-permissions.sh

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Firebase Storage permissions fixed successfully"
          else
            echo "❌ Failed to fix Firebase Storage permissions"
            exit 1
          fi
