name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0). Leave empty to extract from Cargo.toml.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Determine release version from tag or manual input
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Extract from Cargo.toml as single source of truth
            CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          fi

  # Build macOS universal binary and DMG
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [version]
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --package agent-core --features gui --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --package agent-core --features gui --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Set keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build DMG
        run: |
          chmod +x scripts/build-macos.sh
          VERSION="${{ env.RELEASE_VERSION }}" ./scripts/build-macos.sh
        env:
          VERSION: ${{ env.RELEASE_VERSION }}

      - name: Notarize DMG
        continue-on-error: true
        timeout-minutes: 35
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(ls target/release/*.dmg | grep -v latest | head -1)
          echo "Notarizing $DMG_PATH..."

          # Submit and wait up to 30 minutes
          if xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m; then

            # Staple the ticket
            xcrun stapler staple "$DMG_PATH"
            echo "Notarization complete!"

            # Also staple the latest copy
            LATEST_DMG=$(ls target/release/*-latest.dmg 2>/dev/null || true)
            if [ -n "$LATEST_DMG" ]; then
              xcrun stapler staple "$LATEST_DMG"
            fi
          else
            echo "::warning::Notarization timed out. DMG is signed but not notarized."
            echo "Users can still install by right-clicking and selecting 'Open', then going to System Preferences > Security."
          fi

      - name: Generate checksums
        run: |
          cd target/release
          for f in *.dmg; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-macos-dmg
          path: |
            target/release/*.dmg
            target/release/*.sha256

  # Build Windows MSI installer
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [version]
    env:
      VCPKG_ROOT: C:\vcpkg
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --package agent-core --features gui
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext
          wix extension add -g WixToolset.Util.wixext

      - name: Build MSI
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          wix build -d "TargetDir=.\target\release" -d "Version=$version" -o "target/release/SentinelAgentSetup-$version.msi" wix/main.wxs -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext
        shell: pwsh

      - name: Create latest copy
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          Copy-Item "target/release/SentinelAgentSetup-$version.msi" "target/release/SentinelAgentSetup-latest.msi"
        shell: pwsh

      - name: Generate checksums
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          cd target/release
          Get-FileHash "SentinelAgentSetup-$version.msi" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  SentinelAgentSetup-$version.msi" } | Out-File -Encoding ASCII "SentinelAgentSetup-$version.msi.sha256"
          Get-FileHash "SentinelAgentSetup-latest.msi" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  SentinelAgentSetup-latest.msi" } | Out-File -Encoding ASCII "SentinelAgentSetup-latest.msi.sha256"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-windows-msi
          path: |
            target/release/*.msi
            target/release/*.sha256

  # Build Linux DEB package
  build-deb:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    needs: [version]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libssl-dev pkg-config libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --package agent-core --features gui

      - name: Build DEB package
        run: cargo deb --package agent-core --no-build

      - name: Create latest copy
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          cp target/debian/sentinel-agent_*.deb target/debian/sentinel-agent_latest_amd64.deb

      - name: Generate checksums
        run: |
          cd target/debian
          for f in *.deb; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux-deb
          path: |
            target/debian/*.deb
            target/debian/*.sha256

  # Build Linux RPM package
  build-rpm:
    name: Build Linux RPM
    runs-on: ubuntu-latest
    needs: [version]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libssl-dev pkg-config libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --package agent-core --features gui

      - name: Strip binary
        run: strip target/release/agent-core

      - name: Build RPM package
        run: cargo generate-rpm -p crates/agent-core

      - name: Create latest copy
        run: |
          cp target/generate-rpm/sentinel-agent-*.rpm target/generate-rpm/sentinel-agent-latest.x86_64.rpm

      - name: Generate checksums
        run: |
          cd target/generate-rpm
          for f in *.rpm; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux-rpm
          path: |
            target/generate-rpm/*.rpm
            target/generate-rpm/*.sha256

  # Upload all artifacts to Firebase Storage
  upload-releases:
    name: Upload to Firebase Storage
    runs-on: ubuntu-latest
    needs: [version, build-macos, build-windows, build-deb, build-rpm]
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: sentinel-grc-a8701
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Upload to Firebase Storage
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          BUCKET="gs://sentinel-grc-a8701.firebasestorage.app/releases/agent"

          # Upload macOS DMG to correct path structure
          for f in artifacts/sentinel-agent-macos-dmg/*.dmg; do
            gsutil cp "$f" "$BUCKET/macos/"
          done
          for f in artifacts/sentinel-agent-macos-dmg/*.sha256; do
            gsutil cp "$f" "$BUCKET/macos/" 2>/dev/null || true
          done

          # Upload Windows MSI to correct path structure
          for f in artifacts/sentinel-agent-windows-msi/*.msi; do
            gsutil cp "$f" "$BUCKET/windows/"
          done
          for f in artifacts/sentinel-agent-windows-msi/*.sha256; do
            gsutil cp "$f" "$BUCKET/windows/" 2>/dev/null || true
          done

          # Upload Linux DEB to correct path structure
          for f in artifacts/sentinel-agent-linux-deb/*.deb; do
            gsutil cp "$f" "$BUCKET/linux_deb/"
          done
          for f in artifacts/sentinel-agent-linux-deb/*.sha256; do
            gsutil cp "$f" "$BUCKET/linux_deb/" 2>/dev/null || true
          done

          # Upload Linux RPM to correct path structure
          for f in artifacts/sentinel-agent-linux-rpm/*.rpm; do
            gsutil cp "$f" "$BUCKET/linux_rpm/"
          done
          for f in artifacts/sentinel-agent-linux-rpm/*.sha256; do
            gsutil cp "$f" "$BUCKET/linux_rpm/" 2>/dev/null || true
          done

          echo "All releases uploaded to Firebase Storage with correct path structure"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/sentinel-agent-macos-dmg/*.dmg
            artifacts/sentinel-agent-macos-dmg/*.sha256
            artifacts/sentinel-agent-windows-msi/*.msi
            artifacts/sentinel-agent-windows-msi/*.sha256
            artifacts/sentinel-agent-linux-deb/*.deb
            artifacts/sentinel-agent-linux-deb/*.sha256
            artifacts/sentinel-agent-linux-rpm/*.rpm
            artifacts/sentinel-agent-linux-rpm/*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
