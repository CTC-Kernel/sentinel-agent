name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0). Leave empty to extract from Cargo.toml.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Determine release version from tag or manual input
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Extract from Cargo.toml as single source of truth
            CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════════
  # macOS — Universal binary + DMG + PKG (signed + notarized)
  # ═══════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS (DMG + PKG)
    runs-on: macos-latest
    needs: [version]
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build ARM64
        run: cargo build --release --features gui --package agent-core --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --features gui --package agent-core --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/agent-core \
            target/x86_64-apple-darwin/release/agent-core \
            -output target/release/agent-core

      - name: Import Certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          INSTALLER_CERTIFICATE_PATH="$RUNNER_TEMP/build_installer_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::error::Missing APPLE_CERTIFICATE secret (base64-encoded .p12)."
            exit 1
          fi

          # Create and unlock a dedicated keychain for CI signing
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Save password to file to avoid shell escaping issues
          echo -n "$APPLE_CERTIFICATE_PASSWORD" > "$RUNNER_TEMP/password_app.txt"
          if [ -n "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" ]; then
            echo -n "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" > "$RUNNER_TEMP/password_inst.txt"
          fi

          # Import Developer ID Application certificate
          printf '%s' "$APPLE_CERTIFICATE" | tr -d '\n\r ' | base64 -D > "$CERTIFICATE_PATH"
          if [ ! -s "$CERTIFICATE_PATH" ]; then
            echo "::error::Decoded APPLE_CERTIFICATE is empty. Check that the secret is base64 of a .p12 (single line, not double-encoded)."
            exit 1
          fi

          # Verify certificate password with several variants to handle different OpenSSL/LibreSSL versions
          CERT_VALID=false
          
          # 1. Try with -legacy (required for modern macOS exports if using OpenSSL 3)
          if openssl pkcs12 -legacy -in "$CERTIFICATE_PATH" -passin file:"$RUNNER_TEMP/password_app.txt" -info -noout >/dev/null 2>&1; then
            CERT_VALID=true
            echo "✅ Certificate verified with -legacy flag"
          # 2. Try without -legacy (standard on older OpenSSL or LibreSSL)
          elif openssl pkcs12 -in "$CERTIFICATE_PATH" -passin file:"$RUNNER_TEMP/password_app.txt" -info -noout >/dev/null 2>&1; then
            CERT_VALID=true
            echo "✅ Certificate verified without -legacy flag"
          fi

          if [ "$CERT_VALID" = false ]; then
            echo "::error::APPLE_CERTIFICATE password is invalid or the .p12 is corrupted. Re-export the .p12 and update APPLE_CERTIFICATE/APPLE_CERTIFICATE_PASSWORD."
            exit 1
          fi
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild

          # Import Developer ID Installer certificate if available
          if [ -n "$APPLE_INSTALLER_CERTIFICATE_P12" ]; then
            printf '%s' "$APPLE_INSTALLER_CERTIFICATE_P12" | tr -d '\n\r ' | base64 -D > "$INSTALLER_CERTIFICATE_PATH"
            if [ ! -s "$INSTALLER_CERTIFICATE_PATH" ]; then
              echo "::error::Decoded APPLE_INSTALLER_CERTIFICATE_P12 is empty. Check that the secret is base64 of a .p12 (single line, not double-encoded)."
              exit 1
            fi
            # Verify certificate password
            INSTALLER_CERT_VALID=false
            if openssl pkcs12 -legacy -in "$INSTALLER_CERTIFICATE_PATH" -passin file:"$RUNNER_TEMP/password_inst.txt" -info -noout >/dev/null 2>&1; then
              INSTALLER_CERT_VALID=true
              echo "✅ Installer certificate verified with -legacy flag"
            elif openssl pkcs12 -in "$INSTALLER_CERTIFICATE_PATH" -passin file:"$RUNNER_TEMP/password_inst.txt" -info -noout >/dev/null 2>&1; then
              INSTALLER_CERT_VALID=true
              echo "✅ Installer certificate verified without -legacy flag"
            fi

            if [ "$INSTALLER_CERT_VALID" = false ]; then
              echo "::error::APPLE_INSTALLER_CERTIFICATE_PASSWORD is invalid or the installer .p12 is corrupted. Re-export the .p12 and update secrets."
              exit 1
            fi
            security import "$INSTALLER_CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            echo " Developer ID Installer certificate imported successfully"
          else
            echo "  No Developer ID Installer certificate provided"
          fi

          # Allow codesign/productbuild to access the private key in CI without UI prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Remove temp files
          rm -f "$CERTIFICATE_PATH"
          rm -f "$INSTALLER_CERTIFICATE_PATH"
          rm -f "$RUNNER_TEMP/password_app.txt"
          rm -f "$RUNNER_TEMP/password_inst.txt"

      - name: Build DMG
        run: |
          chmod +x scripts/build-macos.sh
          VERSION="${{ env.RELEASE_VERSION }}" ./scripts/build-macos.sh
        env:
          VERSION: ${{ env.RELEASE_VERSION }}

      - name: Build and Notarize PKG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE: true
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          # Discover identities from the imported keychain
          SIGNING_IDENTITY=$(security find-identity -v | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          INSTALLER_IDENTITY=$(security find-identity -v | grep "Developer ID Installer" | head -1 | awk -F'"' '{print $2}')
          
          echo "Discovered Signing Identity: $SIGNING_IDENTITY"
          echo "Discovered Installer Identity: $INSTALLER_IDENTITY"
          
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::Developer ID Application certificate not found in keychain!"
            exit 1
          fi
          
          # Check if we have an installer certificate for notarization
          if [ -z "$INSTALLER_IDENTITY" ]; then
            echo "::warning::No Developer ID Installer certificate found. Package will be signed but not notarized."
            export NOTARIZE=false
          fi
          
          # Make scripts executable
          chmod +x create-macos-developer-signed-installer.sh
          
          # Run the robust installer script
          # Pass the found identities explicitly
          SIGNING_IDENTITY="$SIGNING_IDENTITY" \
          INSTALLER_IDENTITY="$INSTALLER_IDENTITY" \
          ./create-macos-developer-signed-installer.sh
          
          # Move the output to target/release for artifact upload
          mv "dist/SentinelAgent-${VERSION}.pkg" "target/release/"

      - name: Notarize DMG
        continue-on-error: true
        timeout-minutes: 35
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(ls target/release/SentinelAgent-*.dmg | grep -v latest | head -1)
          echo "Notarizing $DMG_PATH..."

          if xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --verbose \
            --wait --timeout 30m; then
            xcrun stapler staple "$DMG_PATH"
            echo "DMG notarization complete!"
          else
            echo "::warning::DMG notarization timed out."
          fi


      - name: Generate checksums
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          cd target/release
          shasum -a 256 "SentinelAgent-${VERSION}.dmg" "SentinelAgent-${VERSION}.pkg" > SHA256SUMS-macos.txt
          cat SHA256SUMS-macos.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-macos
          path: |
            target/release/SentinelAgent-*.dmg
            target/release/SentinelAgent-*.pkg
            target/release/SHA256SUMS-macos.txt

  # ═══════════════════════════════════════════════════════════════════
  # Windows — MSI installer via WiX v4
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [version]
    env:
      VCPKG_ROOT: C:\vcpkg
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build release binary
        run: cargo build --release --features gui --package agent-core
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_STATIC: "1"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext
          wix extension add -g WixToolset.Util.wixext

      - name: Build MSI
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          wix build `
            -d "TargetDir=.\target\release" `
            -d "Version=$version" `
            -d "AssetsDir=.\assets\icons" `
            -o "target\release\SentinelAgentSetup-$version.msi" `
            wix/main.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext
          echo "MSI created: SentinelAgentSetup-$version.msi"
        shell: pwsh

      - name: Generate checksums
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          cd target\release
          $hash = Get-FileHash "SentinelAgentSetup-$version.msi" -Algorithm SHA256
          "$($hash.Hash.ToLower())  SentinelAgentSetup-$version.msi" | Out-File -Encoding ASCII "SHA256SUMS-windows.txt"
          Get-Content "SHA256SUMS-windows.txt"
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-windows
          path: |
            target/release/SentinelAgentSetup-*.msi
            target/release/SHA256SUMS-windows.txt

  # ═══════════════════════════════════════════════════════════════════
  # Linux — DEB package (Debian/Ubuntu)
  # ═══════════════════════════════════════════════════════════════════
  build-deb:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    needs: [version]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libssl-dev pkg-config libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --features gui --package agent-core

      - name: Build DEB package
        run: cargo deb --package agent-core --no-build --deb-revision 1

      - name: Generate checksums
        run: |
          cd target/debian
          for f in sentinel-agent_*.deb; do
            sha256sum "$f" >> SHA256SUMS-linux-deb.txt
          done
          cat SHA256SUMS-linux-deb.txt

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux-deb
          path: |
            target/debian/sentinel-agent_*.deb
            target/debian/SHA256SUMS-linux-deb.txt

  # ═══════════════════════════════════════════════════════════════════
  # Linux — RPM package (RHEL/Fedora/CentOS)
  # ═══════════════════════════════════════════════════════════════════
  build-rpm:
    name: Build Linux RPM
    runs-on: ubuntu-latest
    needs: [version]
    env:
      OPENSSL_DIR: /usr
      OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
      OPENSSL_INCLUDE_DIR: /usr/include/openssl
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libssl-dev pkg-config libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --features gui --package agent-core

      - name: Strip binary
        run: strip target/release/agent-core

      - name: Build RPM package
        run: cargo generate-rpm -p crates/agent-core

      - name: Generate checksums
        run: |
          cd target/generate-rpm
          for f in sentinel-agent-*.rpm; do
            sha256sum "$f" >> SHA256SUMS-linux-rpm.txt
          done
          cat SHA256SUMS-linux-rpm.txt

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-linux-rpm
          path: |
            target/generate-rpm/sentinel-agent-*.rpm
            target/generate-rpm/SHA256SUMS-linux-rpm.txt

  # ═══════════════════════════════════════════════════════════════════
  # Upload all artifacts to Firebase Storage + GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  upload-releases:
    name: Upload to Firebase Storage
    runs-on: ubuntu-latest
    needs: [version, build-macos, build-windows, build-deb, build-rpm]
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Authenticate and Upload
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # 1. Atomic Bridge: Robustly decode, fix, and DIAGNOSE the secret
          python3 -c "
          import os, base64, json, sys, re
          secret = os.environ.get('GCP_SA_KEY', '').strip()
          if not secret:
              print('::error::GCP_SA_KEY is empty!')
              sys.exit(1)
          
          def get_data(s):
              # Try direct JSON
              try:
                  return json.loads(s)
              except:
                  pass
              # Try stripping quotes
              try:
                  return json.loads(s.strip('\"').strip(\"'\"))
              except:
                  pass
              # Try Base64
              try:
                  return json.loads(base64.b64decode(s).decode('utf-8'))
              except:
                  pass
              return None

          data = get_data(secret)
          if not data:
              print('::error::Failed to decode secret as JSON or Base64')
              sys.exit(1)
          
          if 'private_key' not in data:
              print('::error::JSON missing private_key field')
              sys.exit(1)

          pk = data['private_key']
          print(f'::debug::Raw private_key length: {len(pk)}')
          
          # Fix common escape sequences
          pk = pk.replace('\\\\n', '\n').replace('\\n', '\n').strip()
          
          # Check for valid RSA headers
          header = '-----BEGIN PRIVATE KEY-----'
          footer = '-----END PRIVATE KEY-----'
          
          # If it is one long line including the headers, re-wrap it
          if header in pk and footer in pk:
              if '\n' not in pk.replace(header, '').replace(footer, '').strip():
                  print('::notice::Flattened RSA key detected. Re-wrapping...')
                  content = pk.replace(header, '').replace(footer, '').replace(' ', '').replace('\n', '')
                  wrapped = '\n'.join(content[i:i+64] for i in range(0, len(content), 64))
                  pk = f'{header}\n{wrapped}\n{footer}\n'
          elif '-----BEGIN' not in pk:
              # Maybe it is just the raw base64 content?
              print('::notice::RSA headers missing. Attempting to wrap...')
              content = pk.replace(' ', '').replace('\n', '')
              wrapped = '\n'.join(content[i:i+64] for i in range(0, len(content), 64))
              pk = f'{header}\n{wrapped}\n{footer}\n'

          # Final verification
          print(f'::debug::Final processed private_key has {pk.count(\"\n\")} newlines')
          if pk.startswith(header) and pk.endswith(footer + '\n') or pk.endswith(footer):
               print('✅ RSA Header/Footer check passed')
          else:
               print('::warning::RSA Header/Footer check FAILED. Key might be malformed.')
          
          data['private_key'] = pk
          
          with open('gcp-auth-key.json', 'w') as f:
              json.dump(data, f)
          print('✅ Credential file generated')
          "

          # 2. Instant Auth
          gcloud auth activate-service-account --key-file=gcp-auth-key.json --project=$(cat gcp-auth-key.json | python3 -c "import json, sys; print(json.load(sys.stdin).get('project_id', ''))")
          
          # 3. Upload loop
          VERSION="${{ env.RELEASE_VERSION }}"
          BUCKET="gs://sentinel-grc-a8701.firebasestorage.app/releases/agent"
          
          echo "🚀 Starting atomic upload to $BUCKET..."

          echo "=== Uploading macOS packages ==="
          for f in artifacts/sentinel-agent-macos/SentinelAgent-*.dmg; do
            [ -f "$f" ] && echo "Uploading $f..." && gcloud storage cp "$f" "$BUCKET/macos/"
          done
          for f in artifacts/sentinel-agent-macos/SentinelAgent-*.pkg; do
            [ -f "$f" ] && echo "Uploading $f..." && gcloud storage cp "$f" "$BUCKET/macos/"
          done
          [ -f "artifacts/sentinel-agent-macos/SHA256SUMS-macos.txt" ] && \
            echo "Uploading SHA256SUMS-macos.txt..." && \
            gcloud storage cp "artifacts/sentinel-agent-macos/SHA256SUMS-macos.txt" "$BUCKET/macos/SHA256SUMS.txt"

          echo "=== Uploading Windows packages ==="
          for f in artifacts/sentinel-agent-windows/SentinelAgentSetup-*.msi; do
            [ -f "$f" ] && echo "Uploading $f..." && gcloud storage cp "$f" "$BUCKET/windows/"
          done
          [ -f "artifacts/sentinel-agent-windows/SHA256SUMS-windows.txt" ] && \
            echo "Uploading SHA256SUMS-windows.txt..." && \
            gcloud storage cp "artifacts/sentinel-agent-windows/SHA256SUMS-windows.txt" "$BUCKET/windows/SHA256SUMS.txt"

          echo "=== Uploading Linux DEB packages ==="
          for f in artifacts/sentinel-agent-linux-deb/sentinel-agent_*.deb; do
            [ -f "$f" ] && echo "Uploading $f..." && gcloud storage cp "$f" "$BUCKET/linux_deb/"
          done
          [ -f "artifacts/sentinel-agent-linux-deb/SHA256SUMS-linux-deb.txt" ] && \
            echo "Uploading SHA256SUMS-linux-deb.txt..." && \
            gcloud storage cp "artifacts/sentinel-agent-linux-deb/SHA256SUMS-linux-deb.txt" "$BUCKET/linux_deb/SHA256SUMS.txt"

          echo "=== Uploading Linux RPM packages ==="
          for f in artifacts/sentinel-agent-linux-rpm/sentinel-agent-*.rpm; do
            [ -f "$f" ] && echo "Uploading $f..." && gcloud storage cp "$f" "$BUCKET/linux_rpm/"
          done
          [ -f "artifacts/sentinel-agent-linux-rpm/SHA256SUMS-linux-rpm.txt" ] && \
            echo "Uploading SHA256SUMS-linux-rpm.txt..." && \
            gcloud storage cp "artifacts/sentinel-agent-linux-rpm/SHA256SUMS-linux-rpm.txt" "$BUCKET/linux_rpm/SHA256SUMS.txt"

          echo "=== Setting content types ==="
          gcloud storage objects update "$BUCKET/macos/SentinelAgent-*.dmg" --content-type="application/x-apple-diskimage" 2>/dev/null || true
          gcloud storage objects update "$BUCKET/macos/SentinelAgent-*.pkg" --content-type="application/vnd.apple.installer+xml" 2>/dev/null || true
          gcloud storage objects update "$BUCKET/windows/SentinelAgentSetup-*.msi" --content-type="application/x-msi" 2>/dev/null || true
          gcloud storage objects update "$BUCKET/linux_deb/sentinel-agent_*.deb" --content-type="application/vnd.debian.binary-package" 2>/dev/null || true
          gcloud storage objects update "$BUCKET/linux_rpm/sentinel-agent-*.rpm" --content-type="application/x-rpm" 2>/dev/null || true
          gcloud storage objects update "$BUCKET/*/SHA256SUMS.txt" --content-type="text/plain" 2>/dev/null || true

          echo "✅ Best-practice upload complete"

      - name: Verify uploads
        run: |
          BUCKET="gs://sentinel-grc-a8701.firebasestorage.app/releases/agent"
          echo "=== Firebase Storage contents ==="
          gsutil ls -l "$BUCKET/macos/" 2>/dev/null || echo "(no macos files)"
          gsutil ls -l "$BUCKET/windows/" 2>/dev/null || echo "(no windows files)"
          gsutil ls -l "$BUCKET/linux_deb/" 2>/dev/null || echo "(no linux_deb files)"
          gsutil ls -l "$BUCKET/linux_rpm/" 2>/dev/null || echo "(no linux_rpm files)"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Sentinel Agent v${{ env.RELEASE_VERSION }}"
          body: |
            ## Sentinel GRC Agent v${{ env.RELEASE_VERSION }}

            ### Downloads

            | Platform | Package | Format |
            |----------|---------|--------|
            | macOS (Universal) | `SentinelAgent-${{ env.RELEASE_VERSION }}.dmg` | DMG |
            | macOS (Universal) | `SentinelAgent-${{ env.RELEASE_VERSION }}.pkg` | PKG |
