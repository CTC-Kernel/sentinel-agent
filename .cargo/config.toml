[alias]
xtask = "run --package xtask --"

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

# Security hardening: full RELRO + non-executable stack (Linux)
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-args=-Wl,-z,relro,-z,now,-z,noexecstack"]

# Security hardening: ASLR + DEP + static CRT (Windows MSVC)
# +crt-static embeds VCRUNTIME140.dll into the binary so it runs on any Windows
# machine without requiring the Visual C++ Redistributable to be installed.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-args=/DYNAMICBASE /NXCOMPAT /HIGHENTROPYVA"]

# OpenSSL is vendored (compiled from source) by bundled-sqlcipher-vendored-openssl.
# OPENSSL_NO_VENDOR=0 allows the vendored build to proceed.
# PERL is set per-platform: CI workflows set it for Windows (Strawberry Perl),
# macOS/Linux use the system perl automatically.
[env]
OPENSSL_NO_VENDOR = { value = "0", force = true }
OPENSSL_STATIC = { value = "1", force = true }
