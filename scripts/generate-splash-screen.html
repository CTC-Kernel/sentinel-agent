<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Splash Screen Sentinel GRC - Premium</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 { color: #1d1d1f; margin: 0 0 10px 0; font-size: 32px; letter-spacing: -0.5px; }
        .subtitle { color: #86868b; margin: 0 0 40px 0; font-size: 18px; }
        
        canvas {
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
        }
        
        button {
            background: linear-gradient(135deg, #0071e3, #0077ed);
            color: white;
            border: none;
            border-radius: 980px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }
        
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0, 113, 227, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sentinel GRC</h1>
        <p class="subtitle">Splash Screen Premium • Expérience Immersive</p>
        
        <canvas id="splashCanvas" width="2732" height="2732"></canvas>
        
        <br>
        <button onclick="downloadSplash()">📥 Télécharger splash.png (2732px)</button>
    </div>

    <script>
        const canvas = document.getElementById('splashCanvas');
        const ctx = canvas.getContext('2d');
        const size = 2732;
        const center = size / 2;

        // Couleurs Premium
        const colors = {
            bgStart: '#1e293b',    // Slate 800
            bgEnd: '#0f172a',      // Slate 900
            primary: '#3b82f6',    // Blue 500
            secondary: '#60a5fa',  // Blue 400
            text: '#f8fafc',       // Slate 50
            textMuted: '#94a3b8'   // Slate 400
        };

        function drawSplash() {
            // 1. FOND RICHE (Rich Background)
            const bgGrad = ctx.createRadialGradient(center, center, 0, center, center, size);
            bgGrad.addColorStop(0, '#1e293b'); // Centre légèrement plus clair
            bgGrad.addColorStop(1, '#020617'); // Bords très sombres
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, size, size);

            // 2. TEXTURE CYBERNETIQUE (Subtle Grid)
            ctx.save();
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.03)';
            ctx.lineWidth = 2;
            const gridSize = 120;
            
            // Lignes verticales
            for(let i = 0; i < size; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, size);
                ctx.stroke();
            }
            // Lignes horizontales
            for(let i = 0; i < size; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(size, i);
                ctx.stroke();
            }
            
            // Cercles concentriques décoratifs
            ctx.beginPath();
            ctx.arc(center, center, 600, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.05)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(center, center, 850, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.03)';
            ctx.setLineDash([20, 40]); // Ligne pointillée
            ctx.stroke();
            
            ctx.restore();

            // 3. LOGO HERO (Central Logo)
            ctx.save();
            ctx.translate(center, center - 200); // Légèrement remonté
            const scale = 1.8;
            
            // Lueur derrière le logo
            const glow = ctx.createRadialGradient(0, 0, 100, 0, 0, 500);
            glow.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
            glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 500, 0, Math.PI*2);
            ctx.fill();

            // Dessin du bouclier (réutilisation simplifiée de la logique icône)
            drawShield(ctx, scale);
            
            ctx.restore();

            // 4. TYPOGRAPHIE (Typography)
            // Titre Principal
            ctx.fillStyle = colors.text;
            ctx.font = 'bold 160px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Ombre du texte
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;
            ctx.fillText('SENTINEL GRC', center, center + 500);

            // Sous-titre élégant
            ctx.fillStyle = colors.secondary;
            ctx.font = '500 60px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.shadowBlur = 0; // Reset shadow
            ctx.letterSpacing = '10px'; // Espacement large pour style premium
            
            // Astuce pour letter-spacing sur Canvas (non supporté nativement partout)
            const subtitle = "GOUVERNANCE • RISQUES • CONFORMITÉ";
            ctx.fillText(subtitle, center, center + 620);

            // 5. FOOTER & VERSION
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '40px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillText('v2.0.0 • Enterprise Security Edition', center, size - 150);
            
            // Badge ISO
            drawIsoBadge(ctx, center, center + 800);
        }

        function drawShield(ctx, scale) {
            ctx.scale(scale, scale);
            
            // Ombre portée
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 30;
            ctx.shadowOffsetY = 20;

            // Forme du bouclier
            ctx.beginPath();
            ctx.moveTo(0, -200);
            ctx.bezierCurveTo(140, -200, 200, -160, 200, -60); // Haut droit
            ctx.lineTo(200, 100); // Côté droit
            ctx.bezierCurveTo(200, 240, 100, 320, 0, 380); // Pointe bas
            ctx.bezierCurveTo(-100, 320, -200, 240, -200, 100); // Côté gauche
            ctx.lineTo(-200, -60); // Remontée gauche
            ctx.bezierCurveTo(-200, -160, -140, -200, 0, -200); // Haut gauche
            ctx.closePath();

            // Remplissage dégradé
            const grad = ctx.createLinearGradient(-150, -200, 150, 300);
            grad.addColorStop(0, colors.primary);
            grad.addColorStop(1, '#1d4ed8'); // Bleu plus foncé
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Symbole interne (Checkmark épuré)
            ctx.shadowBlur = 0; // Reset shadow pour le tracé interne
            ctx.beginPath();
            ctx.moveTo(-60, 20);
            ctx.lineTo(-10, 70);
            ctx.lineTo(80, -50);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 25;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.stroke();
            
            // Reset scale
            ctx.scale(1/scale, 1/scale);
        }

        function drawIsoBadge(ctx, x, y) {
            const w = 400;
            const h = 80;
            const r = 40;
            
            ctx.save();
            ctx.translate(x - w/2, y - h/2);
            
            // Fond badge
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, r);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();
            
            // Texte badge
            ctx.fillStyle = colors.secondary;
            ctx.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('CERTIFIÉ ISO 27001', w/2, h/2);
            
            ctx.restore();
        }

        drawSplash();

        function downloadSplash() {
            const link = document.createElement('a');
            link.download = 'splash.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
